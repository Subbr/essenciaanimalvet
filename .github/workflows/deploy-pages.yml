name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Set base path per branch
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "BASE_PATH=/essenciaanimalvet/" >> $GITHUB_ENV
            echo "DEST_DIR=." >> $GITHUB_ENV
          else
            echo "BASE_PATH=/essenciaanimalvet/dev/" >> $GITHUB_ENV
            echo "DEST_DIR=dev" >> $GITHUB_ENV
          fi

      - name: Build
        run: npm run build -- --base=$BASE_PATH

      - name: Debug - list build output
        run: |
          echo "== raiz do projeto =="
          ls -la
          echo "== .output (se existir) =="
          find .output -maxdepth 3 2>/dev/null || echo "sem pasta .output"
          echo "== dist (se existir) =="
          find dist -maxdepth 3 2>/dev/null || echo "sem pasta dist"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.output/public
          destination_dir: ${{ env.DEST_DIR }}
          keep_files: true
